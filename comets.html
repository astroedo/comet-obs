<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comet Observatory · Comets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pages.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="astro.js"></script>
  <script src="comets-data.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function CometsPage() {
      const [comets, setComets] = useState([]);
      const [source, setSource] = useState("Loading…");
      const [maxMagStr, setMaxMagStr] = useState("15");
      const maxMag = parseFloat(maxMagStr);  // NaN → filter uses c.mag <= NaN → no results shown (user intention)
      const [sort, setSort] = useState("mag");
      const [query, setQuery] = useState("");
      const [selected, setSelected] = useState(() => {
        try { return JSON.parse(localStorage.getItem("co_selected") || "[]"); } catch { return []; }
      });
      useEffect(() => { localStorage.setItem("co_selected", JSON.stringify(selected)); }, [selected]);

      useEffect(() => {
        window.CometData.fetchCometsFromJPL().then(res => {
          setComets(res.comets); setSource(res.source);
        });
      }, []);

      const rows = useMemo(() => {
        const q = query.toLowerCase().trim();
        let r = isNaN(maxMag) ? comets : comets.filter(c => c.mag <= maxMag);
        if (q) r = r.filter(c => c.name.toLowerCase().includes(q) || (c.designation || "").toLowerCase().includes(q) || (c.type || "").toLowerCase().includes(q));
        r = [...r].sort((a, b) => {
          if (sort === "mag") return a.mag - b.mag;
          if (sort === "name") return (a.designation || a.name).localeCompare(b.designation || b.name);
          if (sort === "peri") return (a.peri_date || "").localeCompare(b.peri_date || "");
          return 0;
        });
        return r;
      }, [comets, maxMagStr, sort, query]);

      const toggle = id => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

      return (
        <Shell current="comets.html">
          <div className="comets-page">
            <div className="comets-header">
              <div>
                <h1 className="page-title">Comet Catalog</h1>
                <div className="page-sub">JPL SBDB · visible below magnitude {maxMagStr}</div>
              </div>
              <div className="mono" style={{ fontSize: 11, color: "var(--ink-faint)", letterSpacing: "0.08em" }}>
                {rows.length} / {comets.length} · {source}
              </div>
            </div>

            <div className="comets-filters">
              <label>MAG &lt;
                <input type="number" value={maxMagStr}
                  onChange={e => setMaxMagStr(e.target.value)}
                  onBlur={e => { if (e.target.value.trim() === "") setMaxMagStr("15"); }}
                  style={{ width: 60 }} />
              </label>
              <label>SORT
                <select value={sort} onChange={e => setSort(e.target.value)}>
                  <option value="mag">Brightness</option>
                  <option value="name">Designation</option>
                  <option value="peri">Perihelion date</option>
                </select>
              </label>
              <div className="search-bar" style={{ marginLeft: "auto", minWidth: 260 }}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                  <circle cx="11" cy="11" r="6" /><path d="M20 20 L15.5 15.5" />
                </svg>
                <input placeholder="Search name, designation, type…" value={query} onChange={e => setQuery(e.target.value)} />
              </div>
            </div>

            <div className="comets-table">
              <div className="comets-table__head">
                <div>Designation · Name</div>
                <div>Mag now</div>
                <div>Mag peri</div>
                <div>Perihelion</div>
                <div>Orbit type</div>
                <div>Note</div>
                <div>Plot</div>
              </div>
              {rows.map(c => {
                const on = selected.includes(c.designation);
                const pct = Math.max(0, Math.min(1, (15 - c.mag) / 15));
                return (
                  <div key={c.designation} className="comets-table__row" onClick={() => toggle(c.designation)}>
                    <div>
                      <div className="comets-table__name">{c.designation}</div>
                      <div className="dim" style={{ fontSize: 11, marginTop: 2 }}>{c.name}</div>
                    </div>
                    <div>
                      <div style={{ color: "var(--cyan)" }}>{c.mag.toFixed(1)}</div>
                      <div className="mag-bar"><div className="mag-bar__fill" style={{ width: (pct * 100) + "%" }} /></div>
                    </div>
                    <div className="dim">{c.mag_peri != null ? c.mag_peri.toFixed(1) : "—"}</div>
                    <div className="dim">{c.peri_date || "—"}</div>
                    <div><span className="chip chip--cyan">{(c.type || "unknown").slice(0, 22)}</span></div>
                    <div className="comets-table__note">{c.note || <span className="faint">—</span>}</div>
                    <div>
                      <span className="check__box" style={{
                        width: 14, height: 14, display: "inline-grid", placeItems: "center",
                        background: on ? "var(--ember)" : "var(--bg-1)",
                        border: "1px solid " + (on ? "var(--ember)" : "var(--hairline-strong)"),
                        borderRadius: 2,
                      }}>
                        {on && <span style={{ width: 6, height: 3, borderLeft: "1.5px solid #0a0a0a", borderBottom: "1.5px solid #0a0a0a", transform: "rotate(-45deg) translate(1px, -1px)", display: "block" }} />}
                      </span>
                    </div>
                  </div>
                );
              })}
              {rows.length === 0 && (
                <div style={{ padding: 40, textAlign: "center" }} className="mono faint">No comets match current filter.</div>
              )}
            </div>
          </div>
        </Shell>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CometsPage />);
  </script>
</body>
</html>
